# backend/pytest.ini
[pytest]
# Dónde buscar tests
testpaths = tests

# Patrones de nombres de archivos, clases y funciones de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Soporte para funciones async en tests
asyncio_mode = auto

# Opciones por defecto al ejecutar pytest
addopts = 
    -v                  # Verbose: mostrar nombre de cada test
    --tb=short          # Traceback corto en errores
    --cov=app           # Cobertura de código del módulo app
    --cov-report=html   # Reporte HTML de cobertura en htmlcov/