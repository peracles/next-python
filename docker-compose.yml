services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:${POSTGRES_VERSION:-18.1-alpine}
    container_name: next-python_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # ✅ CORREGIDO: Nombre de volumen + ruta con dos puntos
      - next-python_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5429}:5432"
    networks:
      - next-python_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================
  # Backend: FastAPI + Python
  # ===========================================
  backend:
    build:
      # Contexto es la carpeta backend (donde está el Dockerfile)
      context: ./backend
      # ✅ CORREGIDO: Ruta relativa al contexto (no a la raíz)
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
    container_name: next-python_backend
    restart: unless-stopped
    volumes:
      # Hot-reload: monta el código local dentro del contenedor
      - ./backend:/app
      # Excluir carpetas generadas para evitar conflictos
      - /app/__pycache__
      - /app/.venv
    environment:
      PYTHONPATH: /app
      # Nombre del servicio de DB para comunicación interna en la red Docker
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@next-python_db:5432/${DB_NAME}
      SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - next-python_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================
  # Frontend: Next.js + pnpm
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ✅ Pasar solo el número, el Dockerfile agrega -slim
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: next-python_frontend
    restart: unless-stopped
    volumes:
      # ✅ Montaje con usuario mapeado (solución para permisos)
      - ./frontend:/app:cached
      # ✅ Volumen anónimo para node_modules
      - /app/node_modules
      # ✅ Volumen para .next (para evitar problemas de permisos)
      - next-python_next_data:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NODE_ENV: ${ENVIRONMENT:-development}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - next-python_network
    # Ejecutar como root para desarrollo (temporal)
    user: "root"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
# ===========================================
# Volúmenes Persistentes
# ===========================================
volumes:
  next-python_postgres_data:
  next-python_next_data:

# ===========================================
# Redes Aisladas
# ===========================================
networks:
  next-python_network:
    driver: bridge
    name: next-python_network