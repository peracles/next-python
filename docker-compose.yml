services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:${POSTGRES_VERSION:-18.1-alpine}
    container_name: next-python_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - next-python_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5429}:5432"
    networks:
      - next-python_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================
  # Backend: FastAPI + Python
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
    container_name: next-python_backend
    restart: unless-stopped
    # ✅ CRÍTICO: Montar TODO el backend en /app (NO solo app/)
    volumes:
      - ./backend:/app          # ← Hot-reload: tu código local sobrescribe el de la imagen
      - /app/__pycache__        # ← Excluir cache
      - /app/.venv              # ← Excluir venv
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@next-python_db:5432/${DB_NAME}
      SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: ${ENVIRONMENT:-development}  # ← Tu variable
    # ✅ CRÍTICO: command sobrescribe el CMD del Dockerfile
    # Usa --reload solo si ENVIRONMENT=development
    command: >
      sh -c 'if [ "$$ENVIRONMENT" = "development" ]; then
              exec /usr/local/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
            else
              exec /usr/local/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000;
            fi'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - next-python_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Frontend: Next.js + pnpm
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-25-alpine}
    container_name: next-python_frontend
    restart: unless-stopped
    volumes:
      # ✅ Código fuente con :cached para rendimiento en Windows
      - ./frontend:/app:cached
      # ✅ Volumen anónimo para proteger node_modules del contenedor
      - /app/node_modules
      # ✅ Volumen nombrado para .next (evita problemas de permisos)
      - next-python_next_data:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NODE_ENV: ${ENVIRONMENT:-development}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - next-python_network
    # ✅ Ejecutar como root para desarrollo (evita permisos)
    user: "root"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ===========================================
# Volúmenes Persistentes
# ===========================================
volumes:
  next-python_postgres_data:
  next-python_next_data:

# ===========================================
# Redes Aisladas
# ===========================================
networks:
  next-python_network:
    driver: bridge
    name: next-python_network